<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Device | Smart Campus Security</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<main class="container">

    <div class="page-header">
        <h2>Edit Device Information</h2>
        <p>Update the device details below.</p>
    </div>

    <div class="form-box">

        <form method="POST">

            <div class="form-group">
                <label for="device_name">Device Name</label>
                <input 
                    type="text"
                    id="device_name"
                    name="device_name"
                    value="{{ asset.device_name }}"
                    required>
            </div>

            <div class="form-group">
                <label for="device_type">Device Type</label>
                <select id="device_type" name="device_type" required>
                    <option value="pc" {% if asset.device_type=='pc' %}selected{% endif %}>PC / Workstation</option>
                    <option value="router" {% if asset.device_type=='router' %}selected{% endif %}>Router</option>
                    <option value="server" {% if asset.device_type=='server' %}selected{% endif %}>Server</option>
                    <option value="camera" {% if asset.device_type=='camera' %}selected{% endif %}>Security Camera</option>
                    <option value="printer" {% if asset.device_type=='printer' %}selected{% endif %}>Printer</option>
                    <option value="iot" {% if asset.device_type=='iot' %}selected{% endif %}>IoT Device</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ip_address">IP Address</label>
                <input 
                    type="text"
                    id="ip_address"
                    name="ip_address"
                    value="{{ asset.ip }}"
                    required>
            </div>

            <div class="form-group">
                <label for="mac_address">MAC Address</label>
                <input 
                    type="text"
                    id="mac_address"
                    name="mac_address"
                    value="{{ asset.mac_address }}"
                    required>
            </div>

            <div class="form-group">
                <label for="location">Location (Lab / Department)</label>
                <input 
                    type="text"
                    id="location"
                    name="location"
                    value="{{ asset.location }}"
                    required>
            </div>

            <div class="form-group">
                <label for="status">Device Status</label>
                <select id="status" name="status">
                    <option value="active" {% if asset.status=='active' %}selected{% endif %}>Active</option>
                    <option value="inactive" {% if asset.status=='inactive' %}selected{% endif %}>Inactive</option>
                </select>
            </div>

            <br>

            <button type="submit" class="btn">Update Device</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn-cancel">Cancel</a>

        </form>

    </div>

</main>

</body>
</html>
