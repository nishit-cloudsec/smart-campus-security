<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Create Admin</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    </head>
    <body>
        <div class="container">
            <div class="admin-container">

                <h2 class="admin-title">Admin Creation Panel</h2>

                <p class="admin-note">Authorized access only</p>

                <form method="POST">

                    <input type="text" name="username" placeholder="Username" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <input type="password" name="key" placeholder="Secret Key" required>

                    <button type="submit" class="admin-btn">Create Admin</button>

                </form>

            </div>
                {% if success %}
            {% if error %}
            <div style="
                background:#2e0b0b;
                color:#ef4444;
                padding:10px;
                border-radius:6px;
                text-align:center;
                margin-bottom:15px;">
                {{ error }}
            </div>
            {% endif %}

            <script>
                setTimeout(function(){
                    window.location.href = "/login";
                }, 1000); // 1 second
            </script>
            {% endif %}
        </div>
    </body>
</html>
