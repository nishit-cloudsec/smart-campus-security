<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Create Admin</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    </head>
    <body>
        <div class="container">
            <div class="admin-container">

                <h2 class="admin-title">Admin Creation Panel</h2>

                <p class="admin-note">Authorized access only</p>

                <form method="POST">

                    <input type="text" name="username" placeholder="Username" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <input type="password" name="key" placeholder="Secret Key" required>

                    <button type="submit" class="admin-btn">Create Admin</button>

                </form>

            </div>
                {% if error %}
                <div style="color:#ef4444; margin-top: 1rem;">{{ error }}</div>
                {% endif %}

                {% if success %}
                <div style="color:#22c55e; margin-top: 1rem;">{{ success }}</div>
                <script>setTimeout(() => window.location.href='/login', 1500)</script>
                {% endif %}
        </div>
    </body>
</html>
