<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Add Device</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='form.css') }}">
    </head>
    <body class="center-box">
        <div class="container">

            <h2>Add New Device</h2>
            <p class="subtitle">Register a device to monitor on the campus network</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div style="color:#22c55e; text-align:center; margin-bottom:10px;">
                        {% for msg in messages %}
                            {{ msg }}
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">

                <label>Device Name</label>
                <input type="text" name="device_name" placeholder="Example: Lab-PC-01" required>

                <label>Device Type</label>
                <select name="device_type" required>
                    <option value="">-- Select Device Type --</option>
                    <option>Laptop</option>
                    <option>Desktop</option>
                    <option>Router</option>
                    <option>Printer</option>
                </select>

                <label>IP Address</label>
                <input type="text" name="ip_address" placeholder="Example: 192.168.1.50" required>

                <label>MAC Address</label>
                <input type="text" name="mac_address" placeholder="Example: 00:1A:2B:3C:4D:5E" required>

                <label>Location</label>
                <input type="text" name="location" placeholder="Example: Computer Lab" required>

                <label>Device Status</label>
                <select name="status">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>

                <button type="submit" class="btn">Add Device</button>

            </form>

            <p class="switch-text">
                <a href="{{ url_for('admin_dashboard') }}">Cancel</a>
            </p>

        </div>
    </body>
</html>
