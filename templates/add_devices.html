<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Device | Smart Campus Security</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<main class="container">

    <div class="page-header">
        <h2>Add New Device</h2>
        <p>Register a device to monitor on the campus network.</p>
    </div>

    <form action="{{ url_for('add_asset') }}" method="POST">

        <div class="form-group">
            <label for="device_name">Device Name</label>
            <input type="text" id="device_name" name="device_name"
            placeholder="Example: Lab-PC-01" required>
        </div>

        <div class="form-group">
            <label for="device_type">Device Type</label>
            <select id="device_type" name="device_type" required>
                <option value="">-- Select Device Type --</option>
                <option value="pc">PC / Workstation</option>
                <option value="router">Router</option>
                <option value="server">Server</option>
                <option value="camera">Security Camera</option>
                <option value="printer">Printer</option>
                <option value="iot">IoT Device</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ip_address">IP Address</label>
            <input type="text" id="ip_address" name="ip_address"
            placeholder="Example: 192.168.1.50" required>
        </div>

        <div class="form-group">
            <label for="mac_address">MAC Address</label>
            <input type="text" id="mac_address" name="mac_address"
            placeholder="Example: 00:1A:2B:3C:4D:5E" required>
        </div>

        <div class="form-group">
            <label for="location">Location (Lab / Department)</label>
            <input type="text" id="location" name="location"
            placeholder="Example: Computer Lab 2" required>
        </div>

        <div class="form-group">
            <label for="status">Device Status</label>
            <select id="status" name="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>

        <br>

        <button type="submit" class="btn">Add Device</button>
        <a href="{{ url_for('admin_dashboard') }}" style="margin-left:10px;">Cancel</a>

    </form>

</main>

</body>
</html>
