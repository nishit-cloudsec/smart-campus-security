<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Edit Device</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='form.css') }}">
    </head>

    <body>
        <main class="container">

            <h2>Edit Device</h2>

            <form method="POST">

                <label>Device Name</label>
                <input type="text" name="device_name" value="{{ asset.device_name }}" required>

                <label>Device Type</label>
                <select name="device_type">
                    <option value="laptop" {% if asset.device_type=='laptop' %}selected{% endif %}>Laptop</option>
                    <option value="Desktop" {% if asset.device_type=='Desktop' %}selected{% endif %}>Desktop</option>
                    <option value="Router" {% if asset.device_type=='Router' %}selected{% endif %}>Router</option>
                    <option value="Printer" {% if asset.device_type=='Printer' %}selected{% endif %}>Printer</option>
                </select>

                <label>IP Address</label>
                <input type="text" name="ip_address" value="{{ asset.ip_address }}" required>

                <label>MAC Address</label>
                <input type="text" name="mac_address" value="{{ asset.mac_address }}" required>

                <label>Location</label>
                <input type="text" name="location" value="{{ asset.location }}" required>

                <label>Status</label>
                <select name="status">
                    <option value="active" {% if asset.status=='active' %}selected{% endif %}>Active</option>
                    <option value="inactive" {% if asset.status=='inactive' %}selected{% endif %}>Inactive</option>
                </select>

                <br><br>

                <button type="submit" class="btn">Update</button>
                <p class="switch-text">
                    <a href="{{ url_for('admin_dashboard') }}">Cancel</a>
                </p>

            </form>
        </main>
    </body>
</html>
